# AgentDoG-consistent generation preset.
# Requires TRACEHOUND_API_BASE / TRACEHOUND_API_KEY / TRACEHOUND_MODEL.

out: data/tmp/generated_agentdog_llm
count: 10000
limit:
scenarios: [all]
labels: [all]
generation_backend: llm
include_eval: true
include_sft: true
include_agentdog_sft: true
include_agentdog15_official_sft: true
include_preference: true
include_rl: true
qc_policy: agentdog_strict
llm_qc: true
llm_generation_retries: 2
llm_generation_temperature: 0.2
llm_generation_concurrency: 1
llm_qc_concurrency: 1
checkpoint_dir:
resume: false
pause_file:
semantic_repair_backend: llm
semantic_repair_rounds: 1
llm_qc_judge: api
llm_qc_judges: []
llm_qc_mode: compressed
llm_qc_consensus_threshold: 0.67
llm_qc_match_policy: label_relabel
qc_min_score: 0.74
training_max_repair_level: structural
write_clean_layout: true
write_legacy_flat_files: true
split_train_ratio: 0.8
split_eval_ratio: 0.1
split_test_ratio: 0.1
split_seed: 20260701
write_qc_report: true
write_examples: false
