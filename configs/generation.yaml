# TraceHound synthetic data generation defaults.
# Keep this dependency-free YAML subset simple: scalar values and inline lists only.

out: data/tmp/generated_from_config
count: 10000
limit:
scenarios: [all]
labels: [all]
generation_backend: deterministic
include_eval: true
include_sft: true
include_agentdog_sft: true
include_agentdog15_official_sft: true
include_preference: true
include_rl: true
qc_policy: agentdog_local
llm_qc: false
llm_generation_retries: 2
llm_generation_temperature: 0.2
llm_generation_concurrency: 1
llm_qc_concurrency: 1
checkpoint_dir:
resume: false
pause_file:
semantic_repair_backend: static
semantic_repair_rounds: 1
llm_qc_judge: api
llm_qc_judges: []
llm_qc_mode: compressed
llm_qc_consensus_threshold: 0.67
qc_min_score: 0.74
training_max_repair_level: structural
write_qc_report: true
write_examples: false
